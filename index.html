<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scanner QR - AMA">
  <link rel="icon" type="image/png" href="./icons/icon-90.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/ama-pwa.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>Scanner QR - AMA</title>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            console.log('SW registrato', reg);
            // Controlla aggiornamenti ogni volta che l'utente torna sulla pagina
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update();
            });
          })
          .catch(err => console.error('SW errore', err));

        // Mostra il toast solo se c'era già un SW installato (esclude il primo install)
        const hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (hadController) showUpdateToast();
        });
      });
    }

    function showUpdateToast() {
      document.getElementById('update-toast').style.display = 'flex';
    }

    function applyUpdate() {
      window.location.reload();
    }
  </script>
</head>
<body>

  <!-- Spinner overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="spinner-label">Verifica in corso...</div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-title">🌙 Le Mille e Una Notte 2026</div>
      <div class="header-sub">Verifica Biglietti</div>
    </div>
    <div class="header-badge" id="status-badge">...</div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-icon">🔐</div>
    <div class="login-title">Area Riservata</div>
    <div class="login-sub">Accedi per iniziare la verifica biglietti</div>
    <form class="login-card" onsubmit="doLogin(); return false;">
      <div class="login-error" id="login-error"></div>
      <div class="login-field">
        <label>Utente</label>
        <input type="text" id="login-user" placeholder="username" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">Accedi</button>
    </form>
  </div>

  <!-- SCANNER -->
  <div id="scanner-screen">
    <div class="scanner-label">📷 Punta la fotocamera sul QR Code</div>

    <div class="reader-wrap">
      <div id="reader">
        <div class="cam-placeholder" id="cam-placeholder">
          <div class="cam-placeholder-icon">📷</div>
          <div class="cam-placeholder-text">Fotocamera non attiva</div>
        </div>
      </div>
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
    </div>

    <div id="loading">
      <div class="loading-dot"></div>
      Verifica biglietto in corso...
    </div>

    <button class="btn-scan start" id="b-start-scan" onclick="avviaScanner()">
      📷 Avvia Scansione
    </button>
    <button class="btn-scan stop" id="b-stop-scan" onclick="fermaScanner()" style="display:none;">
      ✕ Chiudi Fotocamera
    </button>
  </div>

  <!-- RISULTATO fullscreen -->
  <div id="risultato"></div>

  <!-- Toast aggiornamento SW -->
  <div id="update-toast" style="display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e40af; color:#fff; padding:12px 18px; border-radius:10px; z-index:9999; align-items:center; gap:14px; box-shadow:0 4px 16px rgba(0,0,0,0.4); white-space:nowrap;">
    <span>&#x1F504; Aggiornamento disponibile!</span>
    <button onclick="applyUpdate()" style="background:#fff; color:#1e40af; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:14px;">Ricarica</button>
  </div>

  <!-- Footer utente -->
  <div class="user-footer" id="user-footer">
    <div class="user-footer-name">👤 <strong id="user-footer-name"></strong></div>
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/pwa-scanner.js"></script>
</body>
</html>
